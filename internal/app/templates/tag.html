{{define "tag"}}{{template "layout-start" .}}<div class="page-header tag-detail-header"><div><p class="eyebrow">Tag</p><h1>#{{.Tag}}</h1><span class="count">{{.TagNoteCountLabel}}</span></div><div class="note-actions"><a class="btn ghost" href="/_tags">All tags</a><button class="copy-link btn ghost" data-copy-path>Copy path</button></div></div>{{if .Err}}<p class="error">{{.Err}}</p>{{end}}<ul class="note-card-grid tag-note-list">{{range .Notes}}<li class="note-card tag-note-card"><a href="{{.URL}}">{{.Title}}</a><small>{{.RelPath}}</small></li>{{else}}<li class="empty-state">No notes for this tag.</li>{{end}}</ul>{{template "layout-end" .}}{{end}}
